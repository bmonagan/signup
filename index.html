<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="styles.css">
    <title>signup test page</title>
</head>
<body>
    <div class="page">
        <aside class = "sidebar">
            <img src="images/plant.jpg" alt="plant image" class="plant">
            <div class="sidebar-box">
                <img src="images/odin.png" alt="picture of the odin project logo" class="odin">
                <div class = "sidebar-box-text"> ODIN</div>

            </div>
        </aside>
        <div class="main-content">
            <div class = "head-section"><p>Lorem ipsum dolor sit amet consectetur adipisicing elit. Saepe neque natus sed iure sunt eaque, pariatur voluptates maxime dolorem voluptas rerum quasi labore sapiente libero nisi sequi sit odit commodi.</p>
            <p>Veni Vidi Vici.</p>
            </div>
            <div class = "signup">
                <div class="signup-header">
                    <p>Let's do this!</p>
                </div>
                
                <form action="https://httpbin.org/post" method="post">
                    <div class = "signup-left-column">
                        <div class = "form-group">
                            <label for="first_name">FIRST NAME</label>
                            <input type="text" name="first_name" id="first_name" required>
                        </div>

                        <div class = "form-group">
                            <label for="last_name">LAST NAME</label>
                            <input type="text" name="last_name" id="last_name" required>
                        </div>

                        <div class = "form-group">
                            <label for="email">EMAIL</label>
                            <input type="text" name="email" id="email" required>
                        </div>
                    </div>
                    <div class = "signup-right-column">
                        <div class = "form-group">
                            <label for="phone number">PHONE NUMBER</label>
                            <input type="text" name="phone number" id="phone number" required>
                        </div>
                        <div class = "form-group">
                            <label for="password">PASSWORD</label>
                            <input type="password" name="password" id="password" required>
                        </div>
                        <div class = "form-group">
                            <label for="confirm password">CONFIRM PASSWORD</label>
                            <input type="password" name="confirm password" id="confirm password" required>
                        </div>
                    </div>
                </form>
            </div>
            
            <div class = "create-account">
                <button>create-account</button>
                <p>Already have an account? 
                    <a href="login.html"> Log in</a>
                </p>
                
                
            </div>
        </div>
    </div>
    
</body>
</html>
